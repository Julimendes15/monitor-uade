name: Monitor materia UADE

on:
  schedule:
    # Respaldo poco confiable; el disparo real lo hace cron-job.org cada 5 min
    - cron: "*/5 * * * *"
  workflow_dispatch:   # disparo por API (cron-job.org) o manual desde Actions

# Sin concurrency: las corridas son independientes y rápidas; permitir que
# corran en paralelo evita que una lenta encole a las siguientes.

jobs:
  chequear:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cachear navegador Playwright
        id: cache-pw
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-v1

      - name: Instalar dependencias Python
        run: pip install playwright requests

      - name: Instalar Chromium
        # Con cache-hit, 'install' detecta el navegador y no lo re-descarga.
        # 'install-deps' asegura las librerías de sistema (apt) siempre.
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Ejecutar chequeo
        env:
          UADE_EMAIL: ${{ secrets.UADE_EMAIL }}
          UADE_USUARIO: ${{ secrets.UADE_USUARIO }}
          UADE_PASSWORD: ${{ secrets.UADE_PASSWORD }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          HEARTBEAT: ${{ vars.HEARTBEAT }}
        run: python monitor_materia.py --once

      - name: Subir log como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-log
          path: monitor.log
          if-no-files-found: ignore
          retention-days: 3
